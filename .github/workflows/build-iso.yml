name: Build Spectre ISO
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install archiso
        run: |
          pacman -Sy --noconfirm archiso
      - name: Build ISO
        run: |
          find . -name "*.sh" -exec sed -i 's/\r$//' {} \;
          chmod +x build.sh
          ./build.sh
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: spectre-iso
          path: output/*.iso
