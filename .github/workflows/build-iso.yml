name: Build Spectre ISO
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Install archiso and boot dependencies
        run: |
          pacman -Sy --noconfirm archiso syslinux grub
      - name: Build ISO
        run: |
          find . -type f \( -name "*.sh" -o -name "packages.x86_64" -o -name "profiledef.sh" \) -exec sed -i 's/\r$//' {} \;
          chmod +x build.sh
          ./build.sh
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: spectre-iso
          path: output/*.iso
